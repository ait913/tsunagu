services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: tsunagu
      POSTGRES_PASSWORD: tsunagu
      POSTGRES_DB: tsunagu
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  backend:
    build:
      context: ./backend
    depends_on:
      - postgres
    environment:
      NODE_ENV: development
      PORT: 3000
      PUBLIC_BASE_URL: http://localhost:3000
      DATABASE_URL: postgresql://tsunagu:tsunagu@postgres:5432/tsunagu
      JWT_SECRET: please-change-me-32bytes-or-more
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: minio
      S3_SECRET_ACCESS_KEY: minio12345
      S3_BUCKET: tsunagu-tier-docs
      S3_FORCE_PATH_STYLE: "true"
      RESEND_API_KEY: re_xxx
      MAIL_FROM: noreply@tsunagu.appily.run
      EXPO_ACCESS_TOKEN: optional-for-rate-limit-bypass
      ADMIN_EMAILS: touri1705@outlook.com
      OPENAI_API_KEY: sk-...
      AED_NAVI_CSV_PATH: ./data/aed-navi.csv
      EXPO_PUBLIC_API_BASE: http://localhost:3000
      EXPO_PUBLIC_WS_BASE: ws://localhost:3000
      EXPO_PUBLIC_DEMO_NUMBER: "09039655913"
      EXPO_PUBLIC_SENTRY_DSN: ""
    ports:
      - "3000:3000"

volumes:
  pgdata:
  miniodata:
